name: Feature Request
description: Suggest a new feature
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A brief summary of the feature you are requesting.
      placeholder: Describe the feature you would like to see.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Explain the problem or use case this feature would address.
      placeholder: Describe why this feature is needed and who would benefit from it.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe how you think this feature should work.
      placeholder: Describe your ideal solution.
    validations:
      required: false

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you have considered.
      placeholder: Describe any alternatives you have thought about.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references related to this request.
      placeholder: Add any other context here.
    validations:
      required: false
