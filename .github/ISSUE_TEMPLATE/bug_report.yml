name: Bug Report
description: Report a bug in OpenPapers
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug you encountered.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what you expected to happen.
    validations:
      required: false

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: Describe what actually happened.
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: How are you running OpenPapers?
      options:
        - Docker
        - Local dev
        - Production
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of OpenPapers are you using?
      placeholder: e.g. v1.0.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Any relevant log output.
      render: shell
      placeholder: Paste any relevant logs here.
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
      placeholder: Drag and drop screenshots here.
    validations:
      required: false
