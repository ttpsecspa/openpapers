name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npx vite build

      - name: Create release archive
        run: tar -czf openpapers-${{ github.ref_name }}-dist.tar.gz -C frontend dist

      - name: Generate SHA-256 checksums
        run: sha256sum openpapers-${{ github.ref_name }}-dist.tar.gz > openpapers-${{ github.ref_name }}-dist.tar.gz.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            openpapers-${{ github.ref_name }}-dist.tar.gz
            openpapers-${{ github.ref_name }}-dist.tar.gz.sha256
