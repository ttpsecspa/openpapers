<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- Arrowhead marker -->
    <marker id="arrowDown" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <path d="M1 1 L5 7 L9 1" fill="none" stroke="#e6edf3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowRight" markerWidth="8" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1 L7 5 L1 9" fill="none" stroke="#e6edf3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowLeft" markerWidth="8" markerHeight="10" refX="1" refY="5" orient="auto">
      <path d="M7 1 L1 5 L7 9" fill="none" stroke="#e6edf3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="6" fill="#080b12"/>

  <!-- Title -->
  <text x="400" y="40" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#e6edf3" font-weight="700" text-anchor="middle" letter-spacing="0.5">
    Architecture
  </text>
  <line x1="340" y1="50" x2="460" y2="50" stroke="#2dd4a8" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- TIER 1: Browser / Frontend             -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(165, 70)">
    <!-- Box -->
    <rect width="470" height="70" rx="8" fill="#161b22" stroke="#2dd4a8" stroke-width="1.5"/>
    <!-- Label -->
    <text x="235" y="28" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#e6edf3" font-weight="600" text-anchor="middle">
      Browser
    </text>
    <!-- Tech tags -->
    <g transform="translate(68, 40)">
      <rect x="0" y="0" width="72" height="22" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="36" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2dd4a8" text-anchor="middle" font-weight="500">React 18</text>
    </g>
    <g transform="translate(152, 40)">
      <rect x="0" y="0" width="52" height="22" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="26" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2dd4a8" text-anchor="middle" font-weight="500">Vite</text>
    </g>
    <g transform="translate(216, 40)">
      <rect x="0" y="0" width="80" height="22" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="40" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2dd4a8" text-anchor="middle" font-weight="500">Tailwind</text>
    </g>
    <g transform="translate(308, 40)">
      <rect x="0" y="0" width="92" height="22" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="46" y="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#2dd4a8" text-anchor="middle" font-weight="500">React Router</text>
    </g>
  </g>

  <!-- Arrow: Browser -> Nginx -->
  <line x1="400" y1="140" x2="400" y2="175" stroke="#e6edf3" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowDown)" opacity="0.6"/>
  <text x="415" y="162" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8b949e">HTTPS</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- TIER 2: Nginx Reverse Proxy            -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(235, 180)">
    <!-- Box -->
    <rect width="330" height="55" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <!-- Icon: shield -->
    <g transform="translate(20, 14)" opacity="0.5">
      <path d="M12 2 L2 7 L2 13 C2 19 6.5 24.5 12 26 C17.5 24.5 22 19 22 13 L22 7 Z" fill="none" stroke="#8b949e" stroke-width="1.5" transform="scale(0.7)"/>
    </g>
    <text x="165" y="24" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#e6edf3" font-weight="600" text-anchor="middle">
      Nginx Reverse Proxy
    </text>
    <text x="165" y="42" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">
      SSL Termination  /  Static Files  /  API Routing
    </text>
  </g>

  <!-- Arrow: Nginx -> Express (left branch) -->
  <line x1="340" y1="235" x2="260" y2="290" stroke="#e6edf3" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <polygon points="256,287 264,293 260,283" fill="#e6edf3" opacity="0.6"/>
  <text x="280" y="268" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8b949e">/api/*</text>

  <!-- Arrow: Nginx -> Static (right branch indicator) -->
  <line x1="460" y1="235" x2="540" y2="290" stroke="#e6edf3" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <polygon points="544,287 536,293 540,283" fill="#e6edf3" opacity="0.6"/>
  <text x="490" y="268" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8b949e">port 3000</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- TIER 3 LEFT: Express.js API            -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(60, 295)">
    <!-- Box -->
    <rect width="320" height="140" rx="8" fill="#161b22" stroke="#2dd4a8" stroke-width="1.5"/>
    <!-- Title -->
    <text x="160" y="28" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#e6edf3" font-weight="600" text-anchor="middle">
      Express.js API
    </text>
    <line x1="20" y1="40" x2="300" y2="40" stroke="#30363d" stroke-width="1"/>
    <!-- Sub-items -->
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="122" height="28" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <circle cx="14" cy="14" r="4" fill="#2dd4a8" opacity="0.6"/>
      <text x="24" y="18" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#e6edf3">JWT Auth</text>
    </g>
    <g transform="translate(20, 90)">
      <rect x="0" y="0" width="122" height="28" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <circle cx="14" cy="14" r="4" fill="#2dd4a8" opacity="0.6"/>
      <text x="24" y="18" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#e6edf3">Zod Validation</text>
    </g>
    <g transform="translate(165, 55)">
      <rect x="0" y="0" width="135" height="28" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <circle cx="14" cy="14" r="4" fill="#2dd4a8" opacity="0.6"/>
      <text x="24" y="18" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#e6edf3">Multer Uploads</text>
    </g>
    <g transform="translate(165, 90)">
      <rect x="0" y="0" width="135" height="28" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <circle cx="14" cy="14" r="4" fill="#2dd4a8" opacity="0.6"/>
      <text x="24" y="18" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#e6edf3">Rate Limiting</text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- TIER 3 RIGHT: SQLite Database           -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(440, 295)">
    <!-- Box -->
    <rect width="280" height="140" rx="8" fill="#161b22" stroke="#2dd4a8" stroke-width="1.5"/>
    <!-- DB icon -->
    <g transform="translate(100, 8)" opacity="0.4">
      <ellipse cx="40" cy="4" rx="14" ry="4" fill="none" stroke="#8b949e" stroke-width="1.2"/>
      <path d="M26 4 L26 14 C26 17 32 20 40 20 C48 20 54 17 54 14 L54 4" fill="none" stroke="#8b949e" stroke-width="1.2"/>
    </g>
    <!-- Title -->
    <text x="140" y="28" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#e6edf3" font-weight="600" text-anchor="middle">
      SQLite (better-sqlite3)
    </text>
    <line x1="20" y1="40" x2="260" y2="40" stroke="#30363d" stroke-width="1"/>
    <!-- Sub-items -->
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="110" height="28" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <circle cx="14" cy="14" r="4" fill="#2dd4a8" opacity="0.6"/>
      <text x="24" y="18" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#e6edf3">WAL Mode</text>
    </g>
    <g transform="translate(145, 55)">
      <rect x="0" y="0" width="118" height="28" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <circle cx="14" cy="14" r="4" fill="#2dd4a8" opacity="0.6"/>
      <text x="24" y="18" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#e6edf3">Foreign Keys</text>
    </g>
    <g transform="translate(20, 90)">
      <rect x="0" y="0" width="110" height="28" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <circle cx="14" cy="14" r="4" fill="#2dd4a8" opacity="0.6"/>
      <text x="24" y="18" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#e6edf3">Migrations</text>
    </g>
    <g transform="translate(145, 90)">
      <rect x="0" y="0" width="118" height="28" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <circle cx="14" cy="14" r="4" fill="#2dd4a8" opacity="0.6"/>
      <text x="24" y="18" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#e6edf3">Transactions</text>
    </g>
  </g>

  <!-- Arrow: Express -> SQLite (horizontal) -->
  <line x1="380" y1="370" x2="435" y2="370" stroke="#e6edf3" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRight)" opacity="0.6"/>
  <text x="393" y="363" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8b949e">SQL</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- SIDE BOX: Email Service                 -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(60, 460)">
    <rect width="215" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <!-- Mail icon -->
    <g transform="translate(12, 7)">
      <rect x="0" y="0" width="18" height="14" rx="2" fill="none" stroke="#8b949e" stroke-width="1.2"/>
      <polyline points="0,0 9,8 18,0" fill="none" stroke="#8b949e" stroke-width="1.2"/>
    </g>
    <text x="40" y="22" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#e6edf3" font-weight="500">
      Email Service
    </text>
    <text x="148" y="22" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8b949e" font-weight="400">
      (Nodemailer)
    </text>
  </g>

  <!-- Arrow: Express -> Email (down-left) -->
  <line x1="160" y1="435" x2="160" y2="455" stroke="#e6edf3" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowDown)" opacity="0.6"/>
  <text x="170" y="450" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8b949e">SMTP</text>

  <!-- Tier labels (right side) -->
  <g opacity="0.3">
    <text x="775" y="110" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="end" transform="rotate(-90, 775, 110)" letter-spacing="2">CLIENT</text>
    <text x="775" y="212" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="end" transform="rotate(-90, 775, 212)" letter-spacing="2">PROXY</text>
    <text x="775" y="370" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="end" transform="rotate(-90, 775, 370)" letter-spacing="2">SERVER</text>
  </g>
</svg>