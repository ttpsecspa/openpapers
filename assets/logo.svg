<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" width="300" height="60">
  <!-- Background -->
  <rect width="300" height="60" rx="4" fill="#080b12"/>

  <!-- Document Icon -->
  <g transform="translate(12, 10)">
    <!-- Back page -->
    <rect x="4" y="-2" width="28" height="38" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <!-- Front page -->
    <rect x="0" y="2" width="28" height="38" rx="3" fill="#161b22" stroke="#2dd4a8" stroke-width="1.2"/>
    <!-- Fold corner -->
    <path d="M18 2 L28 12 L18 12 Z" fill="#0d1117" stroke="#2dd4a8" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Text lines -->
    <line x1="6" y1="20" x2="16" y2="20" stroke="#2dd4a8" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="6" y1="26" x2="22" y2="26" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="6" y1="32" x2="18" y2="32" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Text: OpenPapers -->
  <text x="52" y="38" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#e6edf3">Open</tspan><tspan fill="#2dd4a8">Papers</tspan>
  </text>
</svg>