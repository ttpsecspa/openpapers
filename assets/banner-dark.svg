<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="900" height="250">
  <defs>
    <linearGradient id="bannerGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4a8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#080b12" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4a8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2dd4a8" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" rx="6" fill="#080b12"/>

  <!-- Subtle gradient overlay -->
  <rect width="900" height="250" rx="6" fill="url(#bannerGlow)"/>

  <!-- Subtle bottom border accent -->
  <rect x="0" y="246" width="900" height="4" rx="0" fill="#2dd4a8" opacity="0.3"/>

  <!-- Decorative dots pattern (top-right) -->
  <g opacity="0.06" fill="#2dd4a8">
    <circle cx="780" cy="30" r="1.5"/>
    <circle cx="795" cy="30" r="1.5"/>
    <circle cx="810" cy="30" r="1.5"/>
    <circle cx="825" cy="30" r="1.5"/>
    <circle cx="840" cy="30" r="1.5"/>
    <circle cx="855" cy="30" r="1.5"/>
    <circle cx="870" cy="30" r="1.5"/>
    <circle cx="780" cy="45" r="1.5"/>
    <circle cx="795" cy="45" r="1.5"/>
    <circle cx="810" cy="45" r="1.5"/>
    <circle cx="825" cy="45" r="1.5"/>
    <circle cx="840" cy="45" r="1.5"/>
    <circle cx="855" cy="45" r="1.5"/>
    <circle cx="870" cy="45" r="1.5"/>
    <circle cx="780" cy="60" r="1.5"/>
    <circle cx="795" cy="60" r="1.5"/>
    <circle cx="810" cy="60" r="1.5"/>
    <circle cx="825" cy="60" r="1.5"/>
    <circle cx="840" cy="60" r="1.5"/>
    <circle cx="855" cy="60" r="1.5"/>
    <circle cx="870" cy="60" r="1.5"/>
  </g>

  <!-- Document/Paper Icon -->
  <g transform="translate(90, 65)">
    <!-- Back page -->
    <rect x="8" y="-5" width="62" height="80" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <!-- Front page -->
    <rect x="0" y="0" width="62" height="80" rx="4" fill="#161b22" stroke="#2dd4a8" stroke-width="1.5"/>
    <!-- Fold corner -->
    <path d="M42 0 L62 20 L42 20 Z" fill="#0d1117" stroke="#2dd4a8" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Text lines on document -->
    <line x1="12" y1="34" x2="38" y2="34" stroke="#2dd4a8" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="12" y1="44" x2="48" y2="44" stroke="#8b949e" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="12" y1="54" x2="42" y2="54" stroke="#8b949e" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="12" y1="64" x2="30" y2="64" stroke="#8b949e" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Main Title: OpenPapers -->
  <text x="200" y="115" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="-1">
    <tspan fill="#e6edf3">Open</tspan><tspan fill="#2dd4a8">Papers</tspan>
  </text>

  <!-- Subtitle -->
  <text x="203" y="150" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#8b949e" font-weight="400" letter-spacing="0.5">
    Multi-Conference Call for Papers Platform
  </text>

  <!-- Decorative line under subtitle -->
  <line x1="203" y1="165" x2="340" y2="165" stroke="#2dd4a8" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- by TTPSEC SPA -->
  <text x="835" y="230" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#8b949e" font-weight="400" text-anchor="end" letter-spacing="0.5">
    by TTPSEC SPA
  </text>
</svg>